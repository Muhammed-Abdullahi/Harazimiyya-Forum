<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Harazimiyya Forum</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/reset-password.css">
    
    <!-- Supabase SDK - Load first -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="app-header">
        <h1>Harazimiyya Forum</h1>
        <p class="subtitle">Create New Password</p>
    </header>

    <main class="container">
        <section class="card" id="resetCard">
            <h2>Set New Password</h2>
            
            <p class="reset-description">
                Enter your new password below.
            </p>
            
            <div class="password-container">
                <input type="password" id="newPassword" placeholder="New Password (min 6 characters)" />
                <button type="button" class="password-toggle" id="toggleNewPassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            
            <div class="password-container">
                <input type="password" id="confirmPassword" placeholder="Confirm New Password" />
                <button type="button" class="password-toggle" id="toggleConfirmPassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            
            <button id="updatePasswordBtn">Update Password</button>
            
            <p class="switch"><a href="index.html" class="back-link">Back to Login</a></p>
        </section>
    </main>

    <footer class="app-footer">
        <small>© 2025 Harazimiyya Forum. All rights reserved.</small>
    </footer>

    <!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Your JS files -->
<script src="../js/supabase.js"></script>
<script src="../js/reset-password.js"></script>
</body>
</html>
