    <div class="user-profile">
        <div class="user-avatar">
            <i class="fas fa-user"></i>
        </div>
        <div class="user-info">
            <h4 id="userName">Member</h4>
            <p><i class="fas fa-user-tag"></i> Community Member</p>
        </div>
    </div>
    
    <div class="sidebar-menu">
        <div class="menu-section">
            <h5 class="menu-title">MAIN</h5>
            <ul class="menu-items">
                <li>
                    <a href="home.html">

                <li>
                    <a href="chat.html">
                        <i class="fas fa-comments"></i>
                        <span>Chat</span>
                    </a>
                </li>
                <li>
                    <a href="events.html">
                        <i class="fas fa-calendar"></i>
                        <span>Programs</span>
                    </a>
                </li>
                <li class="active">
                    <a href="gallery.html">
                        <i class="fas fa-images"></i>

                <li>
                    <a href="announcement.html">
                        <i class="fas fa-bullhorn"></i>
                        <span>Announcements</span>
                    </a>
                </li>
                <li>
                    <a href="map.html">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>Map</span>
                    </a>
                </li>
                <li>
                    <a href="admin.html">
                        <i class="fas fa-user-shield"></i>
                        <span>Admin</span>
                    </a>
                </li>
            </ul>

            <div class="sidebar-footer">
        <button class="logout-btn-sidebar" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
        </button>
    </div>
</div>

        </div>
    </div>
    
    

<!-- Overlay -->
<div class="overlay" id="overlay"></div>

<!-- MAIN -->
<main class="main-content">

    <div class="top-bar">
        <div class="top-bar-left">
            <button id="openSidebar" class="menu-btn"><i class="fas fa-bars"></i></button>
            <div>
                <h1>Gallery</h1>
                <p>Images and videos from our programs and activities</p>
            </div>
        </div>
        <button id="addMediaBtn" class="primary-btn hidden">
            <i class="fas fa-plus"></i> Add Media
        </button>
    </div>

    <section id="galleryGrid" class="gallery-grid"></section>

</main>

<!-- UPLOAD MODAL -->
<div id="galleryModal" class="modal hidden">
    <div class="modal-content">
        <h3>Add Gallery Media</h3>

        <select id="mediaType">
            <option value="image">Image</option>
            <option value="video">Video</option>
        </select>

        <input type="text" id="mediaTitle" placeholder="Title" />
        <input type="file" id="mediaFile" />

        <div class="modal-actions">
            <button id="saveMediaBtn" class="primary-btn"><i class="fas fa-save"></i> Save</button>
            <button id="closeGalleryModalBtn" class="ghost-btn"><i class="fas fa-times"></i> Cancel</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/gallery.js"></script>
