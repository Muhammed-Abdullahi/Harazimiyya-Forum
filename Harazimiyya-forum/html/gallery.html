<!-- Overlay -->

<!-- MAIN -->

            <i class="fas fa-plus"></i> Add
        </button>
    </div>

    <section id="galleryGrid" class="gallery-grid"></section>
</main>

<!-- TIKTOK-STYLE UPLOAD MODAL - CORRECTLY PLACED OUTSIDE SIDEBAR -->
<div id="tiktokUploadModal" class="tiktok-upload-modal hidden">
    <div class="tiktok-upload-container">
        <div class="tiktok-upload-header">
            <h3><i class="fas fa-cloud-upload-alt" style="margin-right: 8px;"></i>Upload to Gallery</h3>
            <button class="tiktok-close-btn" id="closeTiktokModal">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="tiktok-upload-body">
            <!-- Media Type Selector -->
            <div class="tiktok-type-selector">
                <button class="tiktok-type-btn image active" id="tiktokTypeImage">
                    <i class="fas fa-image"></i>
                    <span>Image</span>
                </button>
                <button class="tiktok-type-btn video" id="tiktokTypeVideo">
                    <i class="fas fa-video"></i>
                    <span>Video</span>
                </button>
            </div>
            
            <!-- Title Input -->
            <div class="tiktok-title-input">
                <label>
                    <i class="fas fa-heading"></i>
                    Title
                </label>
                <input 
                    type="text" 
                    id="tiktokMediaTitle" 
                    placeholder="Give your media a catchy title..." 
                    maxlength="100"
                >
            </div>
            
            <!-- File Upload Area -->
            <div class="tiktok-file-upload">
                <label>
                    <i class="fas fa-file"></i>
                    Media File
                </label>
                <div class="tiktok-drop-zone" id="tiktokDropZone">
                    <div class="tiktok-drop-icon">
                        <i class="fas fa-cloud-upload-alt"></i>
                    </div>
                    <div class="tiktok-drop-text">
                        Drag and drop your file here
                    </div>
                    <div class="tiktok-drop-subtext" id="tiktokFileHint">
                        Supports: JPG, PNG, GIF, MP4 (Max 50MB)
                    </div>
                    <button class="tiktok-browse-btn" id="tiktokBrowseBtn">
                        <i class="fas fa-folder-open"></i>
                        Browse Files
                    </button>
                    <input 
                        type="file" 
                        id="tiktokMediaFile" 
                        class="tiktok-file-input" 
                        accept="image/*,video/*"
                    >
                </div>
            </div>
            
            <!-- File Preview Area -->
            <div id="tiktokPreviewArea"></div>
            
            <!-- File Requirements -->
            <div class="tiktok-file-reqs">
                <span><i class="fas fa-check-circle"></i> Max size: 50MB</span>
                <span><i class="fas fa-check-circle"></i> Images: JPG, PNG, GIF</span>
                <span><i class="fas fa-check-circle"></i> Videos: MP4</span>
            </div>
            
            <!-- Action Buttons -->
            <div class="tiktok-actions">
                <button class="tiktok-upload-btn" id="tiktokSaveMediaBtn">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Upload to Cloudinary</span>
                </button>
                <button class="tiktok-cancel-btn" id="tiktokCancelBtn">
                    <i class="fas fa-times"></i>
                    <span>Cancel</span>
                </button>
            </div>
            
            <!-- Upload Progress -->
            <div id="tiktokProgress" class="tiktok-progress hidden">
                <div class="tiktok-progress-icon">
                    <i class="fas fa-spinner fa-spin"></i>
                </div>
                <div class="tiktok-progress-bar">
                    <div class="tiktok-progress-fill" style="width: 0%;"></div>
                </div>
                <div class="tiktok-progress-text">0%</div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/gallery.js"></script>



</body>
